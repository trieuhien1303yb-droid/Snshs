name: Decrypt and Unpack Python Payload

on:
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install All Possible Dependencies
      run: |
        python -m pip install --upgrade pip
        # Cài đặt pycryptodome cùng toàn bộ các thư viện mạng phổ biến để tránh lỗi ModuleNotFound
        pip install pycryptodome python-socketio requests aiohttp urllib3 flask websocket-client

    - name: Run Decryption Script
      run: |
        # Chạy file để cố gắng kích hoạt tiến trình giải mã
        python main.py || true 
        # Lệnh "|| true" giúp workflow không bị dừng lại (báo đỏ) kể cả khi code ẩn bên trong bị lỗi
        
    - name: Check and Save Decrypted Files
      run: |
        # Kiểm tra xem file giải mã có xuất hiện không, nếu không, tạo file log ghi lại
        if [ -f "decoded_payload.py" ]; then
          echo "Thành công: Đã tìm thấy decoded_payload.py"
        else
          echo "Không tìm thấy decoded_payload.py trực tiếp, tạo bản backup toàn bộ thư mục công việc."
          ls -la
        fi

    - name: Upload Decrypted Artifact
      uses: actions/upload-artifact@v4
      with:
        name: decrypted-source-code
        # Thay vì chỉ lưu 1 file, ta lưu toàn bộ thư mục để phòng trường hợp nó sinh ra nhiều file ẩn khác
        path: |
          *.py
          *.txt
