name: Decrypt and Unpack Python Payload

on:
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Cài đặt thư viện mã hóa và thư viện socketio mà payload yêu cầu
        pip install pycryptodome python-socketio

    - name: Run Decryption Script
      run: |
        python main.py
        
    - name: Upload Decrypted Artifact
      uses: actions/upload-artifact@v4
      with:
        name: decrypted-source-code
        path: decoded_payloa.py
