name: Decrypt and Unpack Python Payload

on:
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pycryptodome

    - name: Run Decryption Script
      run: |
        python main.py

    - name: Upload Decrypted Artifact
      uses: actions/upload-artifact@v4
      with:
        name: decrypted-source-code
        path: decrypted_layer.py
